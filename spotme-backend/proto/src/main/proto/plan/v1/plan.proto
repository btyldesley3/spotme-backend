syntax = "proto3";

package com.spotme.proto.plan.v1;

option java_package = "com.spotme.proto.plan.v1";
option java_outer_classname = "PlanProto";
option java_multiple_files = true;

// The Plan service definition.
service PlanService {
  rpc StartWorkoutSession (StartWorkoutSessionRequest) returns (StartWorkoutSessionResponse);
  rpc LogSet (LogSetRequest) returns (LogSetResponse);
  rpc Recommend (RecommendRequest) returns (RecommendResponse);
  rpc CompleteWorkoutSession (CompleteWorkoutSessionRequest) returns (CompleteWorkoutSessionResponse);
  rpc GetLatestWorkoutSession (GetLatestWorkoutSessionRequest) returns (WorkoutSessionResponse);
  rpc ListRecentWorkoutSessions (ListRecentWorkoutSessionsRequest) returns (ListWorkoutSessionsResponse);
}

// Start a new workout session for a user
message StartWorkoutSessionRequest {
  string user_id = 1;
  string started_at = 2; // ISO-8601 instant string; if blank, server uses current time
}

message StartWorkoutSessionResponse {
  string session_id = 1;
  string user_id = 2;
  string started_at = 3;
}

// Log a single set into an in-progress session
message LogSetRequest {
  string user_id = 1;
  string session_id = 2;
  string exercise_id = 3;
  int32 set_number = 4;
  int32 reps = 5;
  double weight_kg = 6;
  double rpe = 7;
  string note = 8;
}

message LogSetResponse {
  string session_id = 1;
  int32 total_sets_in_session = 2;
}

// Request for workout recommendation
message RecommendRequest {
  string user_id = 1;
  string exercise_id = 2;
  string rules_version = 3;
  string modality_key = 4;
}

// A single set prescription
message SetPrescription {
  string exercise_id = 1;
  int32 order = 2;
  double prescribed_weight_kg = 3;
  int32 prescribed_reps = 4;
  bool is_backoff = 5;
}

// Response message containing the prescription
message RecommendResponse {
  repeated SetPrescription sets = 1;
}

message CompleteWorkoutSessionRequest {
  string user_id = 1;
  string session_id = 2;
  string finished_at = 3; // ISO-8601 instant string
  int32 min_total_sets = 4;
  int32 min_distinct_exercises = 5;
  int32 min_sets_per_exercise = 6;
  bool require_recovery_feedback_for_progression = 7;
  optional int32 doms = 8;
  optional int32 sleep_quality = 9;
}

message CompleteWorkoutSessionResponse {
  string session_id = 1;
  bool completed = 2;
  bool allows_progression = 3;
  string completion_reason = 4;
  int32 total_exercises = 5;
  int32 total_sets = 6;
  int32 total_reps = 7;
  double total_volume_kg = 8;
}

message GetLatestWorkoutSessionRequest {
  string user_id = 1;
}

message ListRecentWorkoutSessionsRequest {
  string user_id = 1;
  int32 limit = 2;
}

message WorkoutSessionResponse {
  string session_id = 1;
  string user_id = 2;
  string started_at = 3;
  optional string finished_at = 4;
  int32 total_exercises = 5;
  int32 total_sets = 6;
  int32 total_reps = 7;
  double total_volume_kg = 8;
  bool completed = 9;
  bool allows_progression = 10;
  string completion_reason = 11;
}

message ListWorkoutSessionsResponse {
  repeated WorkoutSessionResponse sessions = 1;
}

