version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: spotme-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-spotme}
      POSTGRES_USER: ${POSTGRES_USER:-spotme}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-spotme}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-spotme} -d ${POSTGRES_DB:-spotme}"]
      interval: 10s
      timeout: 5s
      retries: 10

  spotme-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: spotme-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-spotme}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-spotme}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-spotme}
      SPRING_FLYWAY_ENABLED: ${SPRING_FLYWAY_ENABLED:-false}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO:-none}
      SPOTME_GRPC_CLIENT_HOST: spotme-api
      SPOTME_GRPC_CLIENT_PORT: 9090
      SPOTME_GRPC_CLIENT_PLAINTEXT: "true"
      GRPC_SERVER_PORT: 9090
      SERVER_PORT: 8080
    ports:
      - "8080:8080"
      - "9090:9090"

volumes:
  postgres_data:

